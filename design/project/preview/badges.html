<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card">
  <div class="tm-card-eyebrow" style="margin-bottom:14px">Badges · pill, mono, 10px tracking</div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:500">
    <span style="background:#D9F23E;color:#0B1426;padding:4px 10px;border-radius:999px">NEW</span>
    <span style="background:#0B1426;color:#FBF9F4;padding:4px 10px;border-radius:999px">BETA</span>
    <span style="background:#F6F2EA;color:#0B1426;border:1px solid #E2DBCD;padding:3px 9px;border-radius:999px">For registrars</span>
    <span style="background:#BDD9C3;color:#1F2A44;padding:4px 10px;border-radius:999px">● Solved</span>
    <span style="background:#FFB39A;color:#0B1426;padding:4px 10px;border-radius:999px">● Conflict</span>
    <span style="background:#EFEADD;color:#5B6473;padding:4px 10px;border-radius:999px">● Pending</span>
    <span style="background:#B8D4F0;color:#1F2A44;padding:4px 10px;border-radius:999px">● Scheduled</span>
    <span style="background:#C6BFFF;color:#1F2A44;padding:4px 10px;border-radius:999px">● Optional</span>
  </div>
</div>
</body></html>
