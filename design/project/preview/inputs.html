<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card">
  <div class="tm-card-eyebrow" style="margin-bottom:14px">Inputs · hairline, 4px radius, ink focus ring</div>
  <div style="display:flex;flex-direction:column;gap:14px;font-family:'Geist',sans-serif">

    <div style="display:flex;gap:14px">
      <label style="flex:1;display:flex;flex-direction:column;gap:6px">
        <span style="font-size:12px;color:#5B6473;font-weight:500">Work email</span>
        <input type="email" placeholder="dean@university.edu" style="font-family:inherit;font-size:14px;color:#0B1426;background:#FBF9F4;border:1px solid #E2DBCD;border-radius:4px;padding:9px 12px;outline:none">
      </label>
      <label style="flex:1;display:flex;flex-direction:column;gap:6px">
        <span style="font-size:12px;color:#5B6473;font-weight:500">Institution</span>
        <input type="text" value="Trinity College Dublin" style="font-family:inherit;font-size:14px;color:#0B1426;background:#FBF9F4;border:2px solid #0B1426;border-radius:4px;padding:8px 11px;outline:none">
      </label>
    </div>

    <div style="display:flex;gap:14px;align-items:center">
      <select style="font-family:inherit;font-size:14px;color:#0B1426;background:#FBF9F4;border:1px solid #E2DBCD;border-radius:4px;padding:9px 12px;flex:1">
        <option>Term · Spring 2026</option>
      </select>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:#0B1426"><input type="checkbox" checked style="accent-color:#0B1426;width:16px;height:16px"> Include evening slots</label>
    </div>

  </div>
</div>
</body></html>
