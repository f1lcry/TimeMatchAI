{% extends "landing/base.html" %}
{% load copy_tags %}
{% block title %}{% c "success.title" %}{% endblock %}
{% block main %}
<section class="tm-section tm-page">
  <div class="tm-container tm-page__copy">
    <span class="tm-eyebrow">{% c "success.eyebrow" %}</span>
    <h1>{% c "success.h1" %}</h1>
    <p>{% c "success.body" %}</p>
    <a href="{% url 'landing:home' %}" class="tm-btn tm-btn--outline tm-page__back">{% c "btn.back_home" %}</a>
  </div>
</section>
{% endblock %}
