<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card">
  <div class="tm-card-eyebrow" style="margin-bottom:14px">Buttons · sentence case, no shrink-on-press</div>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <button style="font-family:'Geist',sans-serif;font-size:15px;font-weight:500;background:#D9F23E;color:#0B1426;border:none;border-radius:4px;padding:10px 18px;cursor:pointer">Request a demo</button>
    <button style="font-family:'Geist',sans-serif;font-size:15px;font-weight:500;background:#B8D324;color:#0B1426;border:none;border-radius:4px;padding:10px 18px;cursor:pointer">Request a demo</button>
    <span style="font-family:'Geist Mono',monospace;font-size:10px;color:#7C8597;letter-spacing:.1em;text-transform:uppercase">primary · resting / hover</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <button style="font-family:'Geist',sans-serif;font-size:15px;font-weight:500;background:#0B1426;color:#FBF9F4;border:none;border-radius:4px;padding:10px 18px;cursor:pointer">See the platform</button>
    <button style="font-family:'Geist',sans-serif;font-size:15px;font-weight:500;background:transparent;color:#0B1426;border:1px solid #0B1426;border-radius:4px;padding:9px 17px;cursor:pointer">See the platform</button>
    <span style="font-family:'Geist Mono',monospace;font-size:10px;color:#7C8597;letter-spacing:.1em;text-transform:uppercase">secondary · solid / outline</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <button style="font-family:'Geist',sans-serif;font-size:14px;font-weight:500;background:transparent;color:#0B1426;border:none;border-radius:4px;padding:8px 12px;cursor:pointer;text-decoration:underline;text-decoration-color:#CFC6B3;text-underline-offset:3px">How it works →</button>
    <button style="font-family:'Geist',sans-serif;font-size:13px;font-weight:500;background:transparent;color:#5B6473;border:1px solid #E2DBCD;border-radius:4px;padding:6px 10px;cursor:pointer">Cancel</button>
    <span style="font-family:'Geist Mono',monospace;font-size:10px;color:#7C8597;letter-spacing:.1em;text-transform:uppercase">ghost · small</span>
  </div>
</div>
</body></html>
