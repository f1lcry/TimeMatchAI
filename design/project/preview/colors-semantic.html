<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Semantic tokens</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card">
  <div class="tm-card-eyebrow" style="margin-bottom:14px">Semantic tokens — what to actually reach for</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;font-family:'Geist Mono',monospace;font-size:12px">
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:#FBF9F4;border:1px solid #E2DBCD;border-radius:3px"></span><span>--tm-bg</span><span style="color:#7C8597;font-size:10px;margin-left:auto">paper 50</span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:#0B1426;border-radius:3px"></span><span>--tm-fg</span><span style="color:#7C8597;font-size:10px;margin-left:auto">ink 900</span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:#F6F2EA;border:1px solid #E2DBCD;border-radius:3px"></span><span>--tm-bg-surface</span><span style="color:#7C8597;font-size:10px;margin-left:auto">paper 100</span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:#5B6473;border-radius:3px"></span><span>--tm-fg-muted</span><span style="color:#7C8597;font-size:10px;margin-left:auto">slate 600</span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:#EFEADD;border:1px solid #E2DBCD;border-radius:3px"></span><span>--tm-bg-raised</span><span style="color:#7C8597;font-size:10px;margin-left:auto">paper 200</span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:#7C8597;border-radius:3px"></span><span>--tm-fg-subtle</span><span style="color:#7C8597;font-size:10px;margin-left:auto">slate 500</span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:#E2DBCD;border-radius:3px"></span><span>--tm-border</span><span style="color:#7C8597;font-size:10px;margin-left:auto">paper 300</span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:#D9F23E;border-radius:3px"></span><span>--tm-accent</span><span style="color:#7C8597;font-size:10px;margin-left:auto">citron 400</span></div>
  </div>
</div>
</body></html>
