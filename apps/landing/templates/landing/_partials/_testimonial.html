{% load copy_tags %}
<section class="tm-section" id="research">
  <div class="tm-container">
    <div class="tm-testimonial tm-reveal">
      <div class="tm-testimonial__quote-mark" aria-hidden="true">{% if LANGUAGE_CODE == 'en' %}“{% else %}«{% endif %}</div>
      <div>
        <span class="tm-eyebrow">{% c "research.eyebrow" %}</span>
        <blockquote class="tm-testimonial__quote">{% c "research.quote" %}</blockquote>
        <div class="tm-testimonial__person">
          <div class="tm-avatar">{% if LANGUAGE_CODE == 'en' %}HSE{% else %}ВШ{% endif %}</div>
          <div>
            <div class="tm-testimonial__name">{% c "research.attr.name" %}</div>
            <div class="tm-testimonial__role">{% c "research.attr.role" %}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
