<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeMatch — Scheduling, solved.</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--tm-bg);
      color: var(--tm-fg);
      font-family: var(--tm-font-sans);
      width: 1280px;
      margin: 0 auto;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    button { font-family: inherit; }
    .tm-uni-word:last-child { border-right: none !important; }

    /* ---- Print rules ---- */
    @page {
      size: 1280px auto;   /* tall pages, sized to content */
      margin: 0;
    }
    @media print {
      html, body {
        background: var(--tm-bg) !important;
        width: 1280px;
      }
      /* Avoid splitting hero card, feature cards, stat row, testimonial, CTA across pages */
      .tm-no-break {
        break-inside: avoid;
        page-break-inside: avoid;
      }
      /* Page-break BEFORE major sections so each lands on its own page */
      .tm-page-break {
        break-before: page;
        page-break-before: always;
      }
      /* Header — keep static, no sticky on paper */
      header {
        position: static !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.__resources = window.__resources || {
      logo:            '../../assets/logo.svg',
      logoInverse:     '../../assets/logo-inverse.svg',
      gridPattern:     '../../assets/grid-pattern.svg',
      gridPatternDark: '../../assets/grid-pattern-dark.svg'
    };
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="atoms.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="ScheduleGrid.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="LogoBar.jsx"></script>
  <script type="text/babel" src="HowItWorks.jsx"></script>
  <script type="text/babel" src="Features.jsx"></script>
  <script type="text/babel" src="Stats.jsx"></script>
  <script type="text/babel" src="Testimonial.jsx"></script>
  <script type="text/babel" src="CTA.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <>
          <Header />
          <main>
            <div className="tm-no-break"><Hero /></div>
            <div><LogoBar /></div>
            <div className="tm-no-break"><HowItWorks /></div>
            <div className="tm-no-break"><Features /></div>
            <div className="tm-no-break"><Stats /></div>
            <div className="tm-no-break"><Testimonial /></div>
            <div className="tm-no-break"><CTA /></div>
          </main>
          <div className="tm-no-break"><Footer /></div>
        </>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Auto-print once fonts + JSX + a small settle delay are done
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
      } catch (e) {}
      // Wait for the schedule grid + images to settle
      await new Promise(r => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
