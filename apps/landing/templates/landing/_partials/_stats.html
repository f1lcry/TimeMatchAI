{% load copy_tags %}
<section class="tm-section tm-section--ink tm-parallax-host" id="stats">
  <div class="tm-grid-pattern-bg tm-grid-pattern-bg--dark" aria-hidden="true"></div>
  <div class="tm-container" style="position:relative;">
    <div class="tm-section-head tm-reveal">
      <span class="tm-eyebrow">{% c "stats.eyebrow" %}</span>
      <h2>{% c "stats.h2" %}</h2>
    </div>
    <div class="tm-stats__row">

      <div class="tm-stat tm-reveal">
        <div class="tm-stat__value tm-countup" data-countup-to="84.5" data-countup-decimals="1" data-countup-suffix="%">0</div>
        <div class="tm-stat__label">{% c "stats.s1.label" %}</div>
        <div class="tm-stat__foot">{% c "stats.s1.foot" %}</div>
      </div>

      <div class="tm-stat tm-reveal">
        <div class="tm-stat__value tm-countup" data-countup-to="5" data-countup-suffix="×">0</div>
        <div class="tm-stat__label">{% c "stats.s2.label" %}</div>
        <div class="tm-stat__foot">{% c "stats.s2.foot" %}</div>
      </div>

      <div class="tm-stat tm-reveal">
        <div class="tm-stat__value tm-countup" data-countup-to="5" data-countup-prefix="≤" data-countup-suffix="{% c 'stats.s3.suffix' %}">0</div>
        <div class="tm-stat__label">{% c "stats.s3.label" %}</div>
        <div class="tm-stat__foot">{% c "stats.s3.foot" %}</div>
      </div>

      <div class="tm-stat tm-reveal">
        <div class="tm-stat__value tm-stat__value--citron tm-countup" data-countup-to="0" data-countup-static="0">0</div>
        <div class="tm-stat__label">{% c "stats.s4.label" %}</div>
        <div class="tm-stat__foot">{% c "stats.s4.foot" %}</div>
      </div>

    </div>
  </div>
</section>
