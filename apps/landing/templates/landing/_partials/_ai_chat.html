{% load copy_tags %}
<section class="tm-section tm-section--surface" id="ai-chat">
  <div class="tm-container">
    <div class="tm-section-head tm-reveal">
      <span class="tm-eyebrow">{% c "ai.eyebrow" %}</span>
      <h2>{% c "ai.h2" %}</h2>
      <p>{% c "ai.lede" %}</p>
    </div>

    <div class="tm-aichat__grid">
      <div class="tm-aichat__bullets">
        <div class="tm-aichat__bullet tm-reveal">
          <h3>{% c "ai.bullet1.title" %}</h3>
          <p>{% c "ai.bullet1.body" %}</p>
        </div>
        <div class="tm-aichat__bullet tm-reveal">
          <h3>{% c "ai.bullet2.title" %}</h3>
          <p>{% c "ai.bullet2.body" %}</p>
        </div>
        <div class="tm-aichat__bullet tm-reveal">
          <h3>{% c "ai.bullet3.title" %}</h3>
          <p>{% c "ai.bullet3.body" %}</p>
        </div>
      </div>

      <div
        class="tm-aichat-mount tm-reveal"
        data-island="ai-chat"
        data-props='{"locale": "{{ LANGUAGE_CODE }}"}'
        aria-label="{% c 'ai.aria' %}"
      >
        <div class="tm-island-skeleton">{% c "ai.loading" %}</div>
      </div>
    </div>
  </div>
</section>
