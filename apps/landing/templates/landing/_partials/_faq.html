{% load copy_tags %}
<section class="tm-section tm-section--surface" id="faq">
  <div class="tm-container">
    <div class="tm-section-head tm-reveal">
      <span class="tm-eyebrow">{% c "faq.eyebrow" %}</span>
      <h2>{% c "faq.h2" %}</h2>
    </div>

    <div class="tm-faq__list">

      <details class="tm-faq__item tm-reveal">
        <summary>
          <span>{% c "faq.q1" %}</span>
          <span class="tm-faq__chev" aria-hidden="true">+</span>
        </summary>
        <div class="tm-faq__body">{% c "faq.a1" %}</div>
      </details>

      <details class="tm-faq__item tm-reveal">
        <summary>
          <span>{% c "faq.q2" %}</span>

        </summary>

      <details class="tm-faq__item tm-reveal">

        </summary>
        <div class="tm-faq__body">{% c "faq.a3" %}</div>

      <details class="tm-faq__item tm-reveal">

    </div>
  </div>
</section>
