{% load copy_tags %}
<section class="tm-hero tm-parallax-host" id="hero">
  <div class="tm-grid-pattern-bg" aria-hidden="true"></div>
  <div class="tm-container" style="position:relative;">
    <div class="tm-hero__copy tm-reveal">
      <span class="tm-eyebrow">{% c "hero.eyebrow" %}</span>
      <h1>
        {% c "hero.h1.line1" %}<br>
        <span class="tm-hero__accent">{% c "hero.h1.accent" %}</span><span style="font-style: italic;">.</span>
      </h1>
      <p class="tm-hero__lede">{% c "hero.lede" %}</p>
      <div class="tm-hero__cta-row">
        <a href="#cta" class="tm-btn tm-btn--primary tm-btn--lg">{% c "btn.demo" %}</a>
        <a href="#platform" class="tm-btn tm-btn--outline tm-btn--lg">{% c "btn.platform" %}</a>
        <span class="tm-hero__pilot">{% c "hero.pilot" %}</span>
      </div>
    </div>

    <div
      class="tm-schedule-mount tm-reveal"
      data-island="schedule"
      data-props='{"locale": "{{ LANGUAGE_CODE }}"}'
      aria-label="{% c 'hero.schedule.aria' %}"
    >
      <div class="tm-island-skeleton">{% c "hero.schedule.loading" %}</div>
    </div>
  </div>
</section>
