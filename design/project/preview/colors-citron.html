<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Citron scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card">
  <div class="tm-card-eyebrow" style="margin-bottom:14px">Citron — the signature accent. Use sparingly.</div>
  <div class="tm-card-row" style="height:120px">
    <div style="flex:1;background:#E8F289;border-radius:4px;display:flex;align-items:flex-end;padding:10px;color:#0B1426"><div><div style="font-size:13px;font-weight:500">300 · soft</div><div style="font-family:'Geist Mono',monospace;font-size:10px;color:#5B6473">#E8F289</div></div></div>
    <div style="flex:2;background:#D9F23E;border-radius:4px;display:flex;align-items:flex-end;padding:10px;color:#0B1426;position:relative">
      <span style="position:absolute;top:10px;right:10px;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#0B1426;opacity:.7;background:#0B1426;color:#D9F23E;padding:2px 6px;border-radius:2px">THE accent</span>
      <div><div style="font-size:15px;font-weight:600">400 · base</div><div style="font-family:'Geist Mono',monospace;font-size:10px;color:#0B1426;opacity:.75">#D9F23E</div></div>
    </div>
    <div style="flex:1;background:#B8D324;border-radius:4px;display:flex;align-items:flex-end;padding:10px;color:#0B1426"><div><div style="font-size:13px;font-weight:500">500 · hover</div><div style="font-family:'Geist Mono',monospace;font-size:10px;opacity:.7">#B8D324</div></div></div>
    <div style="flex:1;background:#8FA61C;border-radius:4px;display:flex;align-items:flex-end;padding:10px;color:#FBF9F4"><div><div style="font-size:13px;font-weight:500">600 · deep</div><div style="font-family:'Geist Mono',monospace;font-size:10px;opacity:.75">#8FA61C</div></div></div>
  </div>
</div>
</body></html>
