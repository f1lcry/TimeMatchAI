<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Grid motif</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card" style="padding:0;background:#FBF9F4;position:relative;overflow:hidden;height:220px">
  <div style="position:absolute;inset:0;background-image:url('../assets/grid-pattern.svg');background-size:42px 42px"></div>
  <div style="position:absolute;inset:0;display:grid;grid-template-columns:repeat(16,1fr);grid-template-rows:repeat(5,1fr);pointer-events:none">
    <!-- "Matched" highlighted cells, sparse, deliberate -->
    <div style="grid-column:3;grid-row:2;background:#D9F23E;margin:1px"></div>
    <div style="grid-column:7;grid-row:3;background:#D9F23E;margin:1px"></div>
    <div style="grid-column:11;grid-row:2;background:#D9F23E;margin:1px"></div>
    <div style="grid-column:14;grid-row:4;background:#D9F23E;margin:1px"></div>
    <div style="grid-column:5;grid-row:4;background:#C6BFFF;margin:1px"></div>
    <div style="grid-column:9;grid-row:4;background:#FFB39A;margin:1px"></div>
    <div style="grid-column:13;grid-row:3;background:#BDD9C3;margin:1px"></div>
  </div>
  <div style="position:absolute;left:24px;bottom:18px">
    <div style="font-family:'Instrument Serif',serif;font-size:30px;color:#0B1426;line-height:1">The timetable grid is the brand.</div>
    <div style="font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#5B6473;margin-top:6px">grid-pattern.svg · 56px tile · 1px hairline</div>
  </div>
</div>
</body></html>
