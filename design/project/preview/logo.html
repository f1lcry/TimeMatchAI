<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Logo</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card">
  <div class="tm-card-eyebrow" style="margin-bottom:14px">Logo · primary / inverse / monogram</div>
  <div style="display:grid;grid-template-columns:1.4fr 1.4fr 0.7fr;gap:12px;align-items:stretch">
    <div style="background:#FBF9F4;border:1px solid #E2DBCD;border-radius:6px;display:flex;align-items:center;justify-content:center;padding:18px;height:120px">
      <img src="../assets/logo.svg" alt="" style="height:48px"/>
    </div>
    <div style="background:#0B1426;border-radius:6px;display:flex;align-items:center;justify-content:center;padding:18px;height:120px">
      <img src="../assets/logo-inverse.svg" alt="" style="height:48px"/>
    </div>
    <div style="background:#F6F2EA;border:1px solid #E2DBCD;border-radius:6px;display:flex;align-items:center;justify-content:center;padding:18px;height:120px">
      <img src="../assets/monogram.svg" alt="" style="height:64px;width:64px"/>
    </div>
  </div>
</div>
</body></html>
