<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Core palette</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card">
  <div class="tm-card-row" style="height:200px">
    <div style="flex:1;background:#0B1426;border-radius:6px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;color:#FBF9F4">
      <span style="font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.7">Ink</span>
      <div>
        <div style="font-family:'Instrument Serif',serif;font-size:28px;line-height:1">Ink</div>
        <div style="font-family:'Geist Mono',monospace;font-size:11px;opacity:.7;margin-top:4px">#0B1426</div>
      </div>
    </div>
    <div style="flex:1;background:#F6F2EA;border:1px solid #E2DBCD;border-radius:6px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;color:#0B1426">
      <span style="font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.55">Paper</span>
      <div>
        <div style="font-family:'Instrument Serif',serif;font-size:28px;line-height:1">Paper</div>
        <div style="font-family:'Geist Mono',monospace;font-size:11px;opacity:.6;margin-top:4px">#F6F2EA</div>
      </div>
    </div>
    <div style="flex:1;background:#D9F23E;border-radius:6px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;color:#0B1426">
      <span style="font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.65">Citron · Accent</span>
      <div>
        <div style="font-family:'Instrument Serif',serif;font-size:28px;line-height:1">Citron</div>
        <div style="font-family:'Geist Mono',monospace;font-size:11px;opacity:.7;margin-top:4px">#D9F23E</div>
      </div>
    </div>
  </div>
</div>
</body></html>
