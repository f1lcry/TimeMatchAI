<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="tm-card" style="background:#FBF9F4">
  <div class="tm-card-eyebrow" style="margin-bottom:14px">Cards · 1px hairline, 6px radius, warm surface</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:'Geist',sans-serif">
    <div style="background:#F6F2EA;border:1px solid #E2DBCD;border-radius:6px;padding:18px">
      <div style="font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#5B6473;margin-bottom:8px">FEATURE</div>
      <div style="font-family:'Geist',sans-serif;font-size:18px;font-weight:600;color:#0B1426;margin-bottom:6px">Re-solves overnight</div>
      <div style="font-size:13px;line-height:1.5;color:#5B6473">When a room closes, the timetable adapts before morning.</div>
    </div>
    <div style="background:#F6F2EA;border:1px solid #E2DBCD;border-radius:6px;padding:18px;box-shadow:0 1px 2px rgba(11,20,38,.05),0 2px 6px rgba(11,20,38,.04)">
      <div style="font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#5B6473;margin-bottom:8px">INTERACTIVE · HOVERED</div>
      <div style="font-family:'Geist',sans-serif;font-size:18px;font-weight:600;color:#0B1426;margin-bottom:6px">Conflict resolution</div>
      <div style="font-size:13px;line-height:1.5;color:#5B6473">Surfaces the exact constraint behind every clash.</div>
    </div>
  </div>
</div>
</body></html>
